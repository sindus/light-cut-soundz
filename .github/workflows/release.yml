name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: LightCutSoundZ ${{ github.ref_name }}
          releaseBody: |
            ## LightCutSoundZ ${{ github.ref_name }}

            ### Téléchargements

            | Plateforme | Fichier |
            |---|---|
            | macOS Apple Silicon | `LightCutSoundZ_*_aarch64.dmg` |
            | macOS Intel | `LightCutSoundZ_*_x64.dmg` |
            | Linux AppImage | `LightCutSoundZ_*_amd64.AppImage` |
            | Linux Debian/Ubuntu | `light-cut-soundz_*_amd64.deb` |

            ### Homebrew (macOS)
            ```
            brew tap sindus/tap
            brew install --cask lightcutsoundz
            ```
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  update-homebrew:
    name: Update Homebrew tap
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Extract version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download macOS DMGs and compute SHA256
        id: sha
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          VERSION=${{ steps.ver.outputs.version }}
          gh release download "${{ github.ref_name }}" \
            --repo sindus/light-cut-soundz \
            --pattern "LightCutSoundZ_${VERSION}_aarch64.dmg" \
            --pattern "LightCutSoundZ_${VERSION}_x64.dmg"
          echo "arm=$(sha256sum "LightCutSoundZ_${VERSION}_aarch64.dmg" | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "intel=$(sha256sum "LightCutSoundZ_${VERSION}_x64.dmg"   | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Clone homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/sindus/homebrew-tap.git

      - name: Write cask formula
        run: |
          VERSION=${{ steps.ver.outputs.version }}
          SHA_ARM=${{ steps.sha.outputs.arm }}
          SHA_INTEL=${{ steps.sha.outputs.intel }}

          cat <<'CASK_EOF' > homebrew-tap/Casks/lightcutsoundz.rb
cask "lightcutsoundz" do
  version "VERSION_PLACEHOLDER"

  on_arm do
    url "https://github.com/sindus/light-cut-soundz/releases/download/v#{version}/LightCutSoundZ_#{version}_aarch64.dmg"
    sha256 "SHA_ARM_PLACEHOLDER"
  end

  on_intel do
    url "https://github.com/sindus/light-cut-soundz/releases/download/v#{version}/LightCutSoundZ_#{version}_x64.dmg"
    sha256 "SHA_INTEL_PLACEHOLDER"
  end

  name "LightCutSoundZ"
  desc "Fast, minimal desktop audio editor"
  homepage "https://sindus.github.io/light-cut-soundz/"

  app "LightCutSoundZ.app"

  zap trash: [
    "~/Library/Application Support/dev.lightcutsoundz",
    "~/Library/Preferences/dev.lightcutsoundz.plist",
    "~/Library/Saved Application State/dev.lightcutsoundz.savedState",
  ]
end
CASK_EOF

          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/" homebrew-tap/Casks/lightcutsoundz.rb
          sed -i "s/SHA_ARM_PLACEHOLDER/${SHA_ARM}/" homebrew-tap/Casks/lightcutsoundz.rb
          sed -i "s/SHA_INTEL_PLACEHOLDER/${SHA_INTEL}/" homebrew-tap/Casks/lightcutsoundz.rb

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Casks/lightcutsoundz.rb
          git commit -m "Update lightcutsoundz to ${{ steps.ver.outputs.version }}"
          git push
